<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập </title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            background: #111;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
            text-align: center;
            width: 360px;
            color: #fff;
            position: relative;
        }

        .login-box h2 {
            margin-bottom: 30px;
            color: #ff8800;
        }

        /* ======= INPUT WRAPPER để chứa icon ======= */
        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .login-box input {
            width: calc(100% - 8px);
            padding: 15px 45px 15px 15px; /* chừa chỗ icon */
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* ICON con mắt */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            color: #aaa;
        }

        .toggle-password:hover {
            color: #fff;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #ff8800;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #e67600;
        }

        .error {
            color: #ff4d4d;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0px); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0px); }
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Đăng nhập</h2>

        <!-- ===== INPUT có icon con mắt ===== -->
        <div class="input-wrapper">
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>

        <button onclick="checkPass()">Đăng nhập</button>
        <p class="error" id="errorText">Sai key! Hãy liên hệ admin để lấy key</p>
    </div>


<script>
const SALT = "xL1p02ks918Jas9";

// Hàm HASH SHA-256 + SALT
async function hashPassword(password) {
    const encoder = new TextEncoder();
    const data = encoder.encode(password + SALT);

    const hash = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(hash))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
}

const FREE_KEYS = [
    "c3241b48bfc3dd995032013c03e91b20ea4cce0a63983f9fc5d64d0dd23b6ddd"
];

const PREMIUM_KEYS = [];  // thêm key premium nếu có

async function checkPass() {
    let inputPass = document.getElementById("password").value;
    let errorText = document.getElementById("errorText");

    let inputHash = await hashPassword(inputPass);

    if (FREE_KEYS.includes(inputHash)) {
        window.location.href = "darkmathfree.html";
        return;
    }
    else if (PREMIUM_KEYS.includes(inputHash)) {
        window.location.href = "darkmathpremium.html";
        return;
    }
    else {
        errorText.style.display = "block";  
    }
}

/* ===== NÚT HIỆN / ẨN MẬT KHẨU ===== */
function togglePassword() {
    const passInput = document.getElementById("password");
    const icon = document.querySelector(".toggle-password");

    if (passInput.type === "password") {
        passInput.type = "text";
        icon.textContent = "🙈";
    } else {
        passInput.type = "password";
        icon.textContent = "👁️";
    }
}
</script>

</body>
</html>
