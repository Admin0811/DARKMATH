<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập bằng KEY</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000000, #1a1a1a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-box {
            background: #111;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 0 25px rgba(255,255,255,0.1);
            text-align: center;
            width: 360px;
            color: #fff;
            position: relative;
        }

        .login-box h2 {
            margin-bottom: 30px;
            color: #ff8800;
        }

        /* ======= INPUT WRAPPER để chứa icon ======= */
        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .login-box input {
            width: calc(100% - 8px);
            padding: 15px 45px 15px 15px; /* chừa chỗ icon */
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* ICON con mắt */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            color: #aaa;
        }

        .toggle-password:hover {
            color: #fff;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: #ff8800;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-box button:hover {
            background: #e67600;
        }

        .error {
            color: #ff4d4d;
            margin-top: 15px;
            display: none;
            font-weight: bold;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0px); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0px); }
        }
    </style>
</head>
<body>
<div class="login-box">
        <h2>Đăng nhập</h2>

        <!-- ===== INPUT có icon con mắt ===== -->
        <div class="input-wrapper">
            <input type="password" id="password" placeholder="Nhập mật khẩu...">
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>

        <button onclick="checkPass()">Đăng nhập</button>
        <p class="error" id="errorText">Sai key! Hãy liên hệ admin để lấy key</p>
    </div>

<script>
// Tạo mã định danh thiết bị
function getDeviceID() {
    if (!localStorage.getItem("DEVICE_ID")) {
        let newID = "DEV_" + Math.random().toString(36).substring(2);
        localStorage.setItem("DEVICE_ID", newID);
    }
    return localStorage.getItem("DEVICE_ID");
}

// Xử lý đăng nhập bằng KEY
function checkKey() {
    let key = document.getElementById("key").value.trim();
    let errorText = document.getElementById("errorText");

    if (!key) {
        errorText.innerText = "❌ Bạn chưa nhập key!";
        errorText.style.display = "block";
        return;
    }

    try {
        // Loại bỏ tiền tố DARKMATHFREE-
        if (!key.startsWith("DARKMATHFREE-")) {
            errorText.innerText = "❌ Key sai định dạng!";
            errorText.style.display = "block";
            return;
        }

        let raw = atob(key.replace("DARKMATHFREE-", ""));
        let parts = raw.split("|");

        if (parts[0] !== "KEY") {
            errorText.innerText = "❌ Key sai định dạng!";
            errorText.style.display = "block";
            return;
        }

        let expiresAt = Number(parts[1]);
        let deviceLimit = Number(parts[2]);
        if (!expiresAt || !deviceLimit) {
            errorText.innerText = "❌ Key không hợp lệ!";
            errorText.style.display = "block";
            return;
        }

        if (Date.now() > expiresAt) {
            errorText.innerText = "❌ Key đã hết hạn!";
            errorText.style.display = "block";
            return;
        }

        let deviceID = getDeviceID();
        let used = JSON.parse(localStorage.getItem("USED_DEVICES_" + key) || "[]");

        if (!used.includes(deviceID)) {
            if (used.length >= deviceLimit) {
                errorText.innerText = "❌ Key đã đạt giới hạn số thiết bị!";
                errorText.style.display = "block";
                return;
            }
            used.push(deviceID);
            localStorage.setItem("USED_DEVICES_" + key, JSON.stringify(used));
        }

        localStorage.setItem("dm_key", key);
        localStorage.setItem("dm_expire", expiresAt);
        localStorage.setItem("dm_device_limit", deviceLimit);
        localStorage.setItem("dm_devices", JSON.stringify(used));

        // Đăng nhập thành công
        window.location.href = "darkmathfree.html";

    } catch (e) {
        errorText.innerText = "❌ Key không hợp lệ hoặc bị lỗi!";
        errorText.style.display = "block";
    }
}
</script>
<script>
/* ===== NÚT HIỆN / ẨN MẬT KHẨU ===== */
function togglePassword() {
    const passInput = document.getElementById("password");
    const icon = document.querySelector(".toggle-password");

    if (passInput.type === "password") {
        passInput.type = "text";
        icon.textContent = "🙈";
    } else {
        passInput.type = "password";
        icon.textContent = "👁️";
    }
}
</script>
</body>
</html>
